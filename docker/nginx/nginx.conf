server {
    listen 80;
    server_name _;

    # ── Frontend (React SPA) ────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Redireciona todas as rotas desconhecidas para o React (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy para o backend ────────────────────────────────────────────────────
    # O frontend faz chamadas para /api/v1/... e o nginx repassa para o container api
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necessário para uploads
        client_max_body_size 25M;
        proxy_read_timeout   60s;
    }

    # ── Docs do FastAPI (opcional em produção) ──────────────────────────────────
    location /docs {
        proxy_pass http://api:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
    }

    # ── Segurança ───────────────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # Cache de assets estáticos do Vite (têm hash no nome)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
