version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: grubba_user
      POSTGRES_PASSWORD: grubba_pass
      POSTGRES_DB: grubba_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-grants.sql:/docker-entrypoint-initdb.d/01-grants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grubba_user -d grubba_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://grubba_user:grubba_pass@db:5432/grubba_db
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
